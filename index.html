<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>365 Habit Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>

body{
background:#0f0f0f;
font-family:Inter;
display:flex;
justify-content:center;
margin:0;
color:white;
}

.phone{
width:390px;
background:#181818;
min-height:100vh;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
font-size:22px;
margin-bottom:10px;
}

.tabs{
display:flex;
overflow-x:auto;
margin-bottom:15px;
}

.tab{
padding:6px 12px;
margin-right:6px;
background:#2a2a2a;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#ffffff;
color:#000;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

th,td{
border:1px solid #333;
text-align:center;
padding:6px;
}

th{
background:#202020;
font-weight:600;
}

tr:nth-child(even){
background:#151515;
}

input[type="checkbox"]{
transform:scale(1.1);
cursor:pointer;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:white;
color:black;
font-weight:600;
}

.streak{
margin-top:10px;
font-size:14px;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="phone">

<h1>365 Habit Tracker</h1>

<div class="tabs" id="tabs"></div>

<table>

<thead>
<tr>
<th>Day</th>
<th>Making Bed At Morning</th>
<th>No Porn</th>
<th>3 To 4 Litres Water</th>
<th>Intermittent Fasting</th>
<th>Exercise For 2 Hours</th>
<th>Limit Screen Time</th>
<th>Proper Sleep</th>
<th>Stretching And Meditation</th>
<th>Gadgets Care</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="streak" id="streak"></div>

<canvas id="chart"></canvas>

<button onclick="exportPDF()">Export Progress As PDF</button>

</div>

<script>

const habits=[
"Making Bed At Morning",
"No Porn",
"3 To 4 Litres Water",
"Intermittent Fasting",
"Exercise For 2 Hours",
"Limit Screen Time",
"Proper Sleep",
"Stretching And Meditation",
"Gadgets Care"
];

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

let currentMonth=0;

function createTabs(){

let tabs=document.getElementById("tabs");

months.forEach((m,i)=>{

let tab=document.createElement("div");

tab.className="tab";
tab.innerText=m;

if(i===0) tab.classList.add("active");

tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

currentMonth=i;

loadTable();

};

tabs.appendChild(tab);

});

}

function loadTable(){

let body=document.getElementById("tableBody");

body.innerHTML="";

for(let day=1; day<=30; day++){

let row=document.createElement("tr");

let dayCell=document.createElement("td");
dayCell.innerText=day;

row.appendChild(dayCell);

for(let habit=0; habit<habits.length; habit++){

let cell=document.createElement("td");

let checkbox=document.createElement("input");
checkbox.type="checkbox";

let key=currentMonth+"_"+day+"_"+habit;

checkbox.checked=localStorage.getItem(key)=="true";

checkbox.onchange=()=>{

localStorage.setItem(key,checkbox.checked);

updateGraph();
updateStreak();

};

cell.appendChild(checkbox);

row.appendChild(cell);

}

body.appendChild(row);

}

updateGraph();
updateStreak();

}

function updateGraph(){

let dailyProgress=new Array(30).fill(0);

for(let d=1; d<=30; d++){

let completed=0;

for(let h=0; h<habits.length; h++){

if(localStorage.getItem(currentMonth+"_"+d+"_"+h)=="true"){
completed++;
}

}

dailyProgress[d-1]=completed;

}

chart.data.datasets[0].data=dailyProgress;
chart.update();

}

function updateStreak(){

let streak=0;

for(let d=1; d<=365; d++){

let complete=true;

for(let h=0; h<habits.length; h++){

if(localStorage.getItem("0_"+d+"_"+h)!="true"){
complete=false;
break;
}

}

if(complete){
streak++;
}else{
break;
}

}

document.getElementById("streak").innerText="Current Streak : "+streak+" Days";

}

function exportPDF(){

html2pdf().from(document.querySelector(".phone")).save("habit-tracker.pdf");

}

let chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:[
"Day 1","Day 2","Day 3","Day 4","Day 5",
"Day 6","Day 7","Day 8","Day 9","Day 10",
"Day 11","Day 12","Day 13","Day 14","Day 15",
"Day 16","Day 17","Day 18","Day 19","Day 20",
"Day 21","Day 22","Day 23","Day 24","Day 25",
"Day 26","Day 27","Day 28","Day 29","Day 30"
],

datasets:[{

label:"Completed Habits Per Day",

data:new Array(30).fill(0),

borderColor:"#4CAF50",
backgroundColor:"rgba(76,175,80,0.2)",
tension:0.4,
fill:true

}]
},

options:{
plugins:{
legend:{
labels:{
color:"white"
}
}
},

scales:{

x:{
ticks:{
color:"white"
}
},

y:{
ticks:{
color:"white"
},
beginAtZero:true
}

}

}

});

createTabs();
loadTable();

</script>

</body>
</html>
