<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>365 Habit Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Inter;
background:#f6f6f4;
margin:0;
display:flex;
justify-content:center;
}

.phone{
width:390px;
background:white;
min-height:100vh;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.08);
}

h1{
font-family:Space Grotesk;
font-size:22px;
margin-bottom:5px;
}

.tabs{
display:flex;
overflow-x:auto;
margin-bottom:15px;
}

.tab{
padding:6px 12px;
margin-right:6px;
border-radius:8px;
background:#eee;
cursor:pointer;
font-size:12px;
}

.active{
background:black;
color:white;
}

.habit{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.day{
font-size:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:black;
color:white;
font-family:Space Grotesk;
}

.streak{
margin-top:10px;
font-size:13px;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="phone">

<h1>365 Habit Tracker</h1>

<div class="tabs" id="tabs"></div>

<div id="tracker"></div>

<div class="streak" id="streak"></div>

<canvas id="progressChart"></canvas>

<button onclick="exportPDF()">Export Progress PDF</button>

</div>

<script>

const habits = [
"Making bed at morning",
"No Porn",
"3-4 Ltrs Water",
"Intermittent Fasting",
"Exercise 2 hrs",
"Limit Screen Time",
"Proper Sleep",
"Stretching & Meditation",
"Gadgets Care"
];

const months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

let currentMonth=0;

function createTabs(){

const tabDiv=document.getElementById("tabs");

months.forEach((m,i)=>{

const t=document.createElement("div");
t.innerText=m;
t.className="tab";

if(i===0) t.classList.add("active");

t.onclick=()=>{

document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
t.classList.add("active");

currentMonth=i;

loadTracker();

};

tabDiv.appendChild(t);

});

}

function loadTracker(){

const tracker=document.getElementById("tracker");

tracker.innerHTML="";

for(let d=1; d<=30; d++){

const dayDiv=document.createElement("div");

dayDiv.className="day";

const label=document.createElement("span");
label.innerText="Day "+d;

const checks=document.createElement("span");

habits.forEach((h,i)=>{

const id=`m${currentMonth}d${d}h${i}`;

const cb=document.createElement("input");
cb.type="checkbox";

cb.checked=localStorage.getItem(id)==="true";

cb.onchange=()=>{

localStorage.setItem(id,cb.checked);
updateChart();
updateStreak();

};

checks.appendChild(cb);

});

dayDiv.appendChild(label);
dayDiv.appendChild(checks);

tracker.appendChild(dayDiv);

}

updateChart();
updateStreak();

}

function updateChart(){

let total=0;
let done=0;

for(let m=0;m<12;m++){
for(let d=1;d<=30;d++){
for(let h=0;h<habits.length;h++){

total++;

if(localStorage.getItem(`m${m}d${d}h${h}`)==="true"){
done++;
}

}
}
}

chart.data.datasets[0].data=[done,total-done];
chart.update();

}

function updateStreak(){

let streak=0;

for(let i=0;i<365;i++){

let complete=true;

for(let h=0;h<habits.length;h++){

if(localStorage.getItem(`d${i}h${h}`)!=="true"){
complete=false;
break;
}

}

if(complete) streak++;
else break;

}

document.getElementById("streak").innerText="🔥 Current Streak: "+streak+" days";

}

function exportPDF(){

html2pdf().from(document.querySelector(".phone")).save("habit-tracker.pdf");

}

const ctx=document.getElementById('progressChart');

const chart=new Chart(ctx,{
type:'doughnut',
data:{
labels:['Completed','Remaining'],
datasets:[{
data:[0,100]
}]
}
});

createTabs();
loadTracker();

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

setInterval(()=>{

const last=localStorage.getItem("lastUpdate");

const now=new Date().toDateString();

if(last!==now){

new Notification("Habit Tracker Reminder",{
body:"Update today's habits!"
});

}

},3600000);

</script>

</body>
</html>
