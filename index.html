<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>365 Habit Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>

body{
background:#f7f7f7;
font-family:Inter;
display:flex;
justify-content:center;
margin:0;
}

.phone{
width:380px;
background:white;
min-height:100vh;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h1{
font-size:22px;
font-weight:600;
margin-bottom:5px;
}

.tabs{
display:flex;
overflow-x:auto;
margin-bottom:15px;
}

.tab{
padding:6px 12px;
margin-right:6px;
background:#eee;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.tab.active{
background:black;
color:white;
}

.day{
border-bottom:1px solid #eee;
padding:8px 0;
}

.day-title{
font-size:13px;
font-weight:600;
}

.habit{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:4px;
}

button{
margin-top:10px;
padding:10px;
border:none;
width:100%;
border-radius:8px;
background:black;
color:white;
font-size:14px;
}

.streak{
font-size:13px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="phone">

<h1>365 Habit Tracker</h1>

<div id="tabs" class="tabs"></div>

<div id="tracker"></div>

<div class="streak" id="streak"></div>

<canvas id="chart"></canvas>

<button onclick="exportPDF()">Export Progress PDF</button>

</div>

<script>

const habits=[
"Making bed at morning",
"No Porn",
"3-4 ltrs water",
"Intermittent Fasting",
"Excercise for 2 hrs",
"Limit Screen time",
"Proper Sleep",
"Streching and meditation",
"Gadgets care"
];

const months=[
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

let currentMonth=0;

function initTabs(){

let tabs=document.getElementById("tabs");

months.forEach((m,i)=>{

let t=document.createElement("div");

t.className="tab";
t.innerText=m;

if(i===0) t.classList.add("active");

t.onclick=()=>{

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
t.classList.add("active");

currentMonth=i;

loadMonth();

};

tabs.appendChild(t);

});

}

function loadMonth(){

let tracker=document.getElementById("tracker");

tracker.innerHTML="";

for(let d=1; d<=30; d++){

let day=document.createElement("div");
day.className="day";

let title=document.createElement("div");
title.className="day-title";
title.innerText="Day "+d;

day.appendChild(title);

habits.forEach((h,i)=>{

let habit=document.createElement("div");
habit.className="habit";

let label=document.createElement("span");
label.innerText=h;

let cb=document.createElement("input");
cb.type="checkbox";

let key=`${currentMonth}_${d}_${i}`;

cb.checked=localStorage.getItem(key)=="true";

cb.onchange=()=>{

localStorage.setItem(key,cb.checked);

updateGraph();
updateStreak();

};

habit.appendChild(label);
habit.appendChild(cb);

day.appendChild(habit);

});

tracker.appendChild(day);

}

updateGraph();
updateStreak();

}

function updateGraph(){

let done=0;
let total=12*30*habits.length;

for(let m=0;m<12;m++){
for(let d=1;d<=30;d++){
for(let h=0;h<habits.length;h++){

if(localStorage.getItem(`${m}_${d}_${h}`)=="true") done++;

}
}
}

chart.data.datasets[0].data=[done,total-done];
chart.update();

}

function updateStreak(){

let streak=0;

for(let d=1; d<=365; d++){

let complete=true;

for(let h=0; h<habits.length; h++){

if(localStorage.getItem(`0_${d}_${h}`)!="true"){

complete=false;
break;

}

}

if(complete) streak++;
else break;

}

document.getElementById("streak").innerText="🔥 Streak: "+streak+" days";

}

function exportPDF(){

html2pdf().from(document.querySelector(".phone")).save("habit-tracker.pdf");

}

let chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Completed","Remaining"],
datasets:[{
data:[0,1]
}]
}
});

initTabs();
loadMonth();

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

setInterval(()=>{

let today=new Date().toDateString();

let last=localStorage.getItem("last");

if(last!==today){

new Notification("Habit Reminder",{body:"Update your habits today!"});

}

},3600000);

</script>

</body>
</html>
